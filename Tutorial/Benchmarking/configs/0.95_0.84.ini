[MODE]
mode = benchmark
db_to_screen = 
screening_output = database_predictions.csv
sdf_results = False
benchmark_file = /Path/to/Tutorial/PyRMD/Benchmarking/Benchmark_Results.csv

[TRAINING_DATASETS]
use_chembl = True
chembl_file = /Path/to/Tutorial/PyRMD/Benchmarking/fgfr1_chembl.csv
use_actives = False
actives_file = 
use_inactives = False
inactives_file = 

[FINGERPRINTS]
fp_type = mhfp
nbits = 2048
explicit_hydrogens = True
iterations = 3
chirality = False
redundancy = True
features = False

[DECOYS]
use_decoys = True
decoys_file = /Path/to/Tutorial/PyRMD/Benchmarking/fgfr1_decoys.csv
